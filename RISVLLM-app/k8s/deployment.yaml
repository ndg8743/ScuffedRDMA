apiVersion: apps/v1
kind: Deployment
metadata:
  name: risvllm
  namespace: hydra-infra
  labels:
    app: risvllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risvllm
  template:
    metadata:
      labels:
        app: risvllm
    spec:
      nodeSelector:
        kubernetes.io/hostname: cerberus
      containers:
        - name: risvllm
          image: localhost/risvllm-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: VLLM_URL
              value: "http://vllm-decompile.hydra-infra.svc:8000"
            - name: NODE_ENV
              value: production
          resources:
            requests:
              cpu: "250m"
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: risvllm
  namespace: hydra-infra
spec:
  selector:
    app: risvllm
  ports:
    - port: 3000
      targetPort: 3000
      name: http
