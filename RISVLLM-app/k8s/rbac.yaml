apiVersion: v1
kind: ServiceAccount
metadata:
  name: risvllm
  namespace: hydra-infra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: risvllm-model-manager
  namespace: hydra-infra
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["vllm-decompile"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    resourceNames: ["vllm-decompile"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: risvllm-model-manager
  namespace: hydra-infra
subjects:
  - kind: ServiceAccount
    name: risvllm
    namespace: hydra-infra
roleRef:
  kind: Role
  name: risvllm-model-manager
  apiGroup: rbac.authorization.k8s.io
