# Chimera (Head Node) - 3× RTX 3090 (72GB VRAM)
# gpt-oss-120b split across 5 GPUs with pipeline parallelism
#
# Start Cerberus worker FIRST, then this head node

services:
  ray-head:
    image: rayproject/ray:2.35.0-py311-gpu
    container_name: ray-head
    network_mode: host
    ipc: host
    privileged: true
    environment:
      - CUDA_VISIBLE_DEVICES=0,1,2
    command: >
      ray start --head --port=6379
      --dashboard-host=0.0.0.0
      --dashboard-port=8265
      --num-gpus=3
      --block
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 3
              capabilities: [gpu]
    restart: unless-stopped

  vllm-gptoss:
    image: vllm/vllm-openai:gptoss
    container_name: vllm-gptoss
    network_mode: host
    ipc: host
    privileged: true
    depends_on:
      - ray-head
    volumes:
      - /models:/root/.cache/huggingface
    environment:
      # RDMA Configuration (comment out for TCP baseline)
      - NCCL_IB_HCA=${NCCL_IB_HCA:-rxe0}
      - NCCL_SOCKET_IFNAME=${NCCL_SOCKET_IFNAME:-enp71s0}
      - NCCL_DEBUG=INFO
      # For TCP baseline, set these instead:
      # - NCCL_IB_DISABLE=1
      # - NCCL_NET_GDR_LEVEL=0
      - CUDA_VISIBLE_DEVICES=0,1,2
      - RAY_ADDRESS=127.0.0.1:6379
      - VLLM_USE_FLASHINFER_MXFP4_MOE=1
    command: >
      --model openai/gpt-oss-120b
      --tensor-parallel-size 3
      --pipeline-parallel-size 2
      --port 8000
      --host 0.0.0.0
      --trust-remote-code
      --max-model-len 4096
      --gpu-memory-utilization 0.90
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 3
              capabilities: [gpu]
    restart: unless-stopped
