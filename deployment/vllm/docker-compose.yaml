# vLLM Server - Standalone Docker Compose
# Provides OpenAI-compatible API at http://localhost:8000/v1
# OpenWebUI connects to this endpoint

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    network_mode: host
    ipc: host
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0,1,2}
    command: >
      --model ${MODEL:-meta-llama/Llama-3.1-8B-Instruct}
      --tensor-parallel-size ${TP_SIZE:-3}
      --port 8000
      --host 0.0.0.0
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
