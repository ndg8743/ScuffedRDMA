# vLLM Server - OpenAI-compatible API at http://localhost:8000/v1
# Mirrors Ollama models with HuggingFace equivalents

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    network_mode: host
    ipc: host
    volumes:
      # Use same model cache as Ollama for shared storage
      - /models:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=0,1,2
      # Match Ollama settings
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
    command: >
      --model ${MODEL:-deepseek-ai/DeepSeek-R1-Distill-Qwen-32B}
      --tensor-parallel-size ${TP_SIZE:-3}
      --max-model-len ${MAX_MODEL_LEN:-4096}
      --port 8000
      --host 0.0.0.0
      --trust-remote-code
      --enable-prefix-caching
      --gpu-memory-utilization 0.90
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

# Alternative model configurations (uncomment one):
#
# DeepSeek-R1 32B (equivalent to deepseek-r1:32b in Ollama)
# MODEL=deepseek-ai/DeepSeek-R1-Distill-Qwen-32B TP_SIZE=3
#
# DeepSeek-R1 70B (equivalent to deepseek-r1:70b in Ollama)
# MODEL=deepseek-ai/DeepSeek-R1-Distill-Llama-70B TP_SIZE=3
#
# Llama 3.3 70B (equivalent to llama3.3:latest in Ollama)
# MODEL=meta-llama/Llama-3.3-70B-Instruct TP_SIZE=3
#
# Qwen 2.5 32B Coder (equivalent to qwen3-coder:30b in Ollama)
# MODEL=Qwen/Qwen2.5-Coder-32B-Instruct TP_SIZE=3
#
# Mixtral 8x7B (equivalent to mixtral:latest in Ollama)
# MODEL=mistralai/Mixtral-8x7B-Instruct-v0.1 TP_SIZE=2
