services:
  ray-worker:
    image: rayproject/ray:2.35.0-py311-gpu
    container_name: ray-worker
    network_mode: host
    ipc: host
    privileged: true
    volumes:
      - /dev/infiniband:/dev/infiniband
      - /models:/root/.cache/huggingface
    environment:
      - NCCL_IB_HCA=mlx5_0
      - NCCL_DEBUG=INFO
      - CUDA_VISIBLE_DEVICES=0,1
    command: ray start --address=192.168.1.150:6379 --block
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
